name: Reusable Deploy

on:
  workflow_call:
    inputs:
      
      environment:
        description: "GitHub environment name (for approvals/protection rules)"
        type: string
        required: true

      aws-region:
        description: "AWS region where the EKS cluster is running"
        type: string
        required: false
        default: "ap-southeast-2"

      eks-cluster-name:
        description: "EKS cluster name"
        type: string
        required: true

      namespace:
        description: "Kubernetes namespace"
        type: string
        required: false
        default: "default"

      deployment-name:
        description: "Kubernetes deployment name used for rollout checks and rollback"
        type: string
        required: true

      image-tag:
        description: "Application image tag to deploy via Helm"
        type: string
        required: true

      helm-release-name:
        description: "Helm release name"
        type: string
        required: true

      helm-chart-path:
        description: "Path to Helm chart directory"
        type: string
        required: true

      helm-values-file:
        description: "Optional Helm values file path"
        type: string
        required: false
        default: ""

      kubectl-manifest-path:
        description: "Optional manifest file or directory to apply with kubectl"
        type: string
        required: false
        default: ""

      rollout-timeout:
        description: "Rollout timeout (example: 5m, 10m)"
        type: string
        required: false
        default: "10m"

      history-max:
        description: "Maximum Helm revision history to retain"
        type: number
        required: false
        default: 10

    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}-${{ inputs.eks-cluster-name }}-${{ inputs.namespace }}-${{ inputs.deployment-name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      AWS_REGION: ${{ inputs.aws-region }}
      EKS_CLUSTER_NAME: ${{ inputs.eks-cluster-name }}
      K8S_NAMESPACE: ${{ inputs.namespace }}
      DEPLOYMENT_NAME: ${{ inputs.deployment-name }}
      IMAGE_TAG: ${{ inputs.image-tag }}
      HELM_RELEASE_NAME: ${{ inputs.helm-release-name }}
      HELM_CHART_PATH: ${{ inputs.helm-chart-path }}
      HELM_VALUES_FILE: ${{ inputs.helm-values-file }}
      KUBECTL_MANIFEST_PATH: ${{ inputs.kubectl-manifest-path }}
      ROLLOUT_TIMEOUT: ${{ inputs.rollout-timeout }}
      HISTORY_MAX: ${{ inputs.history-max }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact (optional)
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Update kubeconfig for EKS
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME}" \
            --region "${AWS_REGION}"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Verify cluster connectivity
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl get ns
          kubectl get deployment -n "${K8S_NAMESPACE}" || true

      - name: Ensure namespace exists
        run: |
          set -euo pipefail
          kubectl get namespace "${K8S_NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${K8S_NAMESPACE}"

      - name: Helm dependency update (if chart dependencies exist)
        run: |
          set -euo pipefail
          if [ -f "${HELM_CHART_PATH}/Chart.yaml" ]; then
            helm dependency update "${HELM_CHART_PATH}" || true
          fi

      - name: Helm upgrade/install with automatic rollback on failure
        run: |
          set -euo pipefail

          HELM_ARGS=(
            upgrade
            --install "${HELM_RELEASE_NAME}" "${HELM_CHART_PATH}"
            --namespace "${K8S_NAMESPACE}"
            --create-namespace
            --set "image.tag=${IMAGE_TAG}"
            --wait
            --atomic
            --timeout "${ROLLOUT_TIMEOUT}"
            --history-max "${HISTORY_MAX}"
          )

          if [ -n "${HELM_VALUES_FILE}" ]; then
            HELM_ARGS+=( -f "${HELM_VALUES_FILE}" )
          fi

          echo "Running Helm command:"
          printf ' %q' helm "${HELM_ARGS[@]}"
          echo

          helm "${HELM_ARGS[@]}"

      - name: Apply raw Kubernetes manifests (optional)
        if: ${{ inputs.kubectl-manifest-path != '' }}
        run: |
          set -Eeuo pipefail

          rollback() {
            echo "kubectl apply or rollout check failed. Attempting rollback..."
            kubectl rollout undo deployment/"${DEPLOYMENT_NAME}" -n "${K8S_NAMESPACE}" || true
            kubectl rollout status deployment/"${DEPLOYMENT_NAME}" -n "${K8S_NAMESPACE}" --timeout="${ROLLOUT_TIMEOUT}" || true
          }

          trap rollback ERR

          kubectl apply -f "${KUBECTL_MANIFEST_PATH}" -n "${K8S_NAMESPACE}"
          kubectl rollout status deployment/"${DEPLOYMENT_NAME}" -n "${K8S_NAMESPACE}" --timeout="${ROLLOUT_TIMEOUT}"

      - name: Post-deploy verification
        run: |
          set -euo pipefail
          echo "Helm release:"
          helm list -n "${K8S_NAMESPACE}" | grep "${HELM_RELEASE_NAME}" || true

          echo "Deployment details:"
          kubectl get deployment "${DEPLOYMENT_NAME}" -n "${K8S_NAMESPACE}" -o wide

          echo "Pods:"
          kubectl get pods -n "${K8S_NAMESPACE}" -o wide

          echo "Services:"
          kubectl get svc -n "${K8S_NAMESPACE}" -o wide

      - name: Helm history
        if: always()
        run: |
          set +e
          helm history "${HELM_RELEASE_NAME}" -n "${K8S_NAMESPACE}" || true

      - name: Kubernetes events (on failure)
        if: failure()
        run: |
          set +e
          echo "=== Recent events ==="
          kubectl get events -n "${K8S_NAMESPACE}" --sort-by=.metadata.creationTimestamp | tail -n 100 || true

          echo "=== Deployment describe ==="
          kubectl describe deployment "${DEPLOYMENT_NAME}" -n "${K8S_NAMESPACE}" || true

          echo "=== Pods describe ==="
          kubectl describe pods -n "${K8S_NAMESPACE}" || true

          echo "=== Logs ==="
          kubectl logs -n "${K8S_NAMESPACE}" deploy/"${DEPLOYMENT_NAME}" --all-containers=true --tail=200 || true